<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>梦境日记</title>

  <script>
    window.tailwind = { config: { suppressConsoleLogs: true } };
  </script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/index.css" />
  
</head>

<body class="bg-gray-50">
  <div class="container mx-auto px-4 py-8" x-data="dreamApp()" x-init="init()">

    <header class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">🌙 我的梦境日记</h1>
      <button @click="logout" class="text-red-600 hover:underline">退出</button>
    </header>

    <!-- 密钥输入 -->
    <div class="bg-white p-4 rounded shadow mb-6" x-show="!encryptionKey">
      <p class="mb-2">
        🔒 请设置或输入您的加密密钥（用于保护梦境隐私，使用前请提前保存）：
      </p>

      <div class="flex space-x-2">
        <div class="relative flex-grow">
          <input
            :type="showKey ? 'text' : 'password'"
            x-model="tempKey"
            placeholder="点击生成密钥"
            class="border px-3 py-1 rounded w-full pr-10"
          />

          <button
            type="button"
            @click="showKey = !showKey"
            :title="showKey ? '隐藏密钥' : '显示密钥'"
            class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-600 hover:text-gray-900"
          >
            <span x-text="showKey ? '👀' : '🔒'"></span>
          </button>
        </div>

        <button @click="generateNewKey" class="bg-green-600 text-white px-3 py-1 rounded whitespace-nowrap">
          生成新密钥
        </button>

        <button @click="useTempKey" class="bg-blue-600 text-white px-3 py-1 rounded whitespace-nowrap">
          使用
        </button>
      </div>

      <p class="text-sm text-gray-600 mt-2">⚠️ 密钥丢失将无法恢复数据</p>
    </div>

    <!-- 新增梦境 -->
    <div class="bg-white p-4 rounded shadow mb-6" x-show="encryptionKey">
      <h2 class="text-xl font-semibold mb-3">📝 记录新梦境</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="datetime-local" x-model="newDream.time" class="border px-3 py-2 rounded" />

        <select x-model="newDream.mood" class="border px-3 py-2 rounded">
          <option value="">心情</option>
          <option value="开心">开心</option>
          <option value="悲伤">悲伤</option>
          <option value="恐惧">恐惧</option>
          <option value="困惑">困惑</option>
          <option value="平静">平静</option>
        </select>

        <textarea
          x-model="newDream.content"
          placeholder="梦境内容..."
          class="col-span-2 border px-3 py-2 rounded h-32"
        ></textarea>

        <button @click="addDream" class="col-span-2 bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
          保存梦境
        </button>
      </div>
    </div>

    <!-- 梦境列表 -->
    <div x-show="encryptionKey">
      <h2 class="text-xl font-semibold mb-3">📖 我的梦境</h2>

      <template x-for="dream in dreams" :key="dream.id">
        <div class="bg-white p-4 rounded shadow mb-4">
          <div class="flex justify-between">
            <span class="font-medium" x-text="dream.time"></span>
            <span class="text-sm bg-gray-200 px-2 py-1 rounded" x-text="dream.mood"></span>
          </div>

          <p class="my-2" x-text="dream.decryptedContent || '加载中...'"></p>

          <div class="flex space-x-2">
            <button @click="editDream(dream)" class="text-blue-600 text-sm">编辑</button>
            <button @click="deleteDream(dream.id)" class="text-red-600 text-sm">删除</button>
            <button @click="lockData" class="text-gray-600 text-sm">🔒 锁定</button>
          </div>
        </div>
      </template>
    </div>

  </div>

  <script src="js/crypto.js"></script>

  <script>
    function dreamApp() {
      return {
        token: localStorage.getItem('token') || '',
        encryptionKey: localStorage.getItem('dreamKey') || '',
        tempKey: '',
        showKey: false,
        dreams: [],
        newDream: {
          time: new Date().toISOString().slice(0, 16),
          content: '',
          mood: ''
        },

        init() {
          this.checkAuth();
        },

        async checkAuth() {
          if (!this.token) {
            this.logout();
            return;
          }

          const res = await fetch('/api/dreams', {
            headers: { Authorization: 'Bearer ' + this.token }
          });

          if (!res.ok) {
            localStorage.removeItem('token');
            this.logout();
            return;
          }

          if (this.encryptionKey) {
            await this.loadDreams();
          }
        },

        async loadDreams() {
          const res = await fetch('/api/dreams', {
            headers: { Authorization: 'Bearer ' + this.token }
          });

          if (!res.ok) {
            this.logout();
            return;
          }

          const data = await res.json();
          this.dreams = data.map(d => ({ ...d, decryptedContent: '' }));

          for (const d of this.dreams) {
            try {
              d.decryptedContent = await decryptText(d.encrypted_content, this.encryptionKey);
            } catch {
              d.decryptedContent = '[解密失败]';
            }
          }
        },

        async addDream() {
          if (!this.newDream.content.trim()) {
            alert('请输入梦境内容');
            return;
          }

          const encrypted = await encryptText(this.newDream.content, this.encryptionKey);

          const res = await fetch('/api/dreams', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: 'Bearer ' + this.token
            },
            body: JSON.stringify({
              dream_time: this.newDream.time,
              encrypted_content: encrypted,
              mood: this.newDream.mood
            })
          });

          if (res.ok) {
            this.newDream = {
              time: new Date().toISOString().slice(0, 16),
              content: '',
              mood: ''
            };
            await this.loadDreams();
          } else {
            alert('保存失败');
          }
        },

        async editDream(dream) {
          const newText = prompt('编辑梦境内容：', dream.decryptedContent);
          if (newText === null) return;

          const encrypted = await encryptText(newText, this.encryptionKey);

          const res = await fetch(`/api/dreams/${dream.id}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              Authorization: 'Bearer ' + this.token
            },
            body: JSON.stringify({
              dream_time: dream.dream_time,
              encrypted_content: encrypted,
              mood: dream.mood
            })
          });

          if (res.ok) {
            dream.decryptedContent = newText;
          } else {
            alert('更新失败');
          }
        },

        async deleteDream(id) {
          if (!confirm('确定删除？')) return;

          await fetch(`/api/dreams/${id}`, {
            method: 'DELETE',
            headers: { Authorization: 'Bearer ' + this.token }
          });

          await this.loadDreams();
        },

        async generateNewKey() {
          if (this.dreams.length > 0 && !confirm('生成新密钥会导致旧数据无法解密，确定？')) return;
          this.tempKey = await generateKey();
        },

        useTempKey() {
          if (!this.tempKey) {
            alert('请输入密钥');
            return;
          }

          localStorage.setItem('dreamKey', this.tempKey);
          this.encryptionKey = this.tempKey;
          this.showKey = false;
          this.loadDreams();
        },

        lockData() {
          localStorage.removeItem('dreamKey');
          this.encryptionKey = '';
          this.dreams = [];
          this.showKey = false;
        },

        // logout() {
        //   localStorage.removeItem('token');
        //   localStorage.removeItem('dreamKey');
        //   window.location.href = 'login.html';
        // }
      };
    }
  </script>

  <script src="js/script.js"></script>
</body>
</html>
